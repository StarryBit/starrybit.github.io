---
layout: default
title: Devlogs | StarryBit
---

<h1 class="text-4xl font-bold mb-10">
    Devlogs
</h1>


<div class="space-y-8">

{% for post in site.posts %}

<article>

    <a href="{{ post.url }}"
       class="text-xl font-semibold hover:text-indigo-500">

        {{ post.title }}

    </a>


    <p class="text-sm text-zinc-500 code-font mt-2">
        {{ post.date | date: "%B %d, %Y" }}
    </p>


    <p class="mt-3 text-zinc-600 dark:text-zinc-400">
        {{ post.excerpt }}
    </p>


</article>

{% endfor %}

</div>
