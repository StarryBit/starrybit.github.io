<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/jpeg" href="{{ '/starrybit-profile-pic.jpeg' | relative_url }}">

    <!-- Configuration -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- 3. THEME LOGIC -->
    <script>
        // Check local storage or system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        function toggleMenu() {
            document
                .getElementById("mobile-menu")
                .classList.toggle("hidden");
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Geist Mono', monospace; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 transition-colors duration-200">

    <!-- Sticky Navigation Header -->
    <header class="sticky top-0 z-50 border-b border-zinc-200/80 bg-white/80 dark:border-zinc-800/60 dark:bg-zinc-950/70 backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    
            <!-- Logo -->
            <a href="/" class="font-bold text-lg tracking-tight flex items-center gap-1.5">
                <span class="text-indigo-600 dark:text-indigo-400">✦</span>
                StarryBit
            </a>
    
            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center gap-5 text-sm font-medium">
                <a href="/about/" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors">About</a>
                <a href="/shop/" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors">Shop</a>
                <a href="/blog/" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors">Devlogs</a>
    
                <button onclick="toggleTheme()" class="p-1.5 rounded-lg border border-zinc-200 hover:bg-zinc-100 dark:border-zinc-800 dark:hover:bg-zinc-900">
                    🌙
                </button>
    
                <a href="https://discord.gg/JwfTkNN8g"
                   target="_blank"
                   class="text-zinc-900 bg-zinc-100 hover:bg-zinc-200 dark:text-zinc-100 dark:bg-zinc-900 dark:hover:bg-zinc-800 px-3.5 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 transition-all text-xs code-font">
                    Join Discord
                </a>
            </nav>
    
            <!-- Mobile Hamburger -->
            <button
                class="md:hidden p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-900"
                onclick="toggleMenu()">
    
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-6 h-6"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">
    
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
    
            </button>
    
        </div>
    
        <!-- Mobile Menu -->
        <div id="mobile-menu"
             class="hidden md:hidden border-t border-zinc-200 dark:border-zinc-800">
    
            <nav class="flex flex-col p-4 gap-4 text-sm">
    
                <a href="/about/">About</a>
    
                <a href="/shop/">Shop</a>
    
                <a href="/blog/">Devlogs</a>
    
                <button onclick="toggleTheme()" class="text-left">
                    Toggle Theme
                </button>
    
                <a href="https://discord.gg/JwfTkNN8g"
                   target="_blank">
                    Join Discord
                </a>
    
            </nav>
    
        </div>
    </header>

    <!-- Main Content Area (Jekyll injects page content here) -->
    <main class="relative z-10 max-w-5xl mx-auto px-6 py-20 w-full flex-1">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-200 dark:border-zinc-900 bg-white dark:bg-zinc-950 py-8 text-center text-xs text-zinc-500 dark:text-zinc-600 code-font">
        <div class="max-w-5xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>&copy; 2026 StarryBit Dev.</div>
            <div class="flex gap-6">
                <a href="https://www.youtube.com/@StarryBit" target="_blank" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">YouTube</a>
                <a href="https://www.instagram.com/starrybitdev" target="_blank" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">Instagram</a>
                <a href="https://www.tiktok.com/@starrybitdev" target="_blank" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">TikTok</a>
                <a href="https://github.com/StarryBit" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">GitHub</a>
            </div>
        </div>
    </footer>

</body>
</html>
