<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <script>
        // Light/Dark Mode Logic
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Geist Mono', monospace; }
    </style>
</head>
<body>
    <!-- Sticky Navigation Header -->
    <header class="sticky top-0 z-50 border-b border-zinc-200/80 bg-white/80 dark:border-zinc-800/60 dark:bg-zinc-950/70 backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="code-font font-bold text-base tracking-tight flex items-center gap-1.5">
                <span class="text-indigo-600 dark:text-indigo-400">✦</span> starrybit<span class="text-zinc-400 dark:text-zinc-500">.dev</span>
            </a>
            <nav class="flex items-center gap-5 text-sm font-medium">
                <a href="/shop/" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors">Shop</a>
                <a href="/blog/" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors">Devlogs</a>
                
                <!-- Theme Toggle Button -->
                <button onclick="toggleTheme()" class="p-1.5 rounded-lg border border-zinc-200 hover:bg-zinc-100 dark:border-zinc-800 dark:hover:bg-zinc-900 text-zinc-500 dark:text-zinc-400 transition-all">
                    <svg class="hidden dark:block w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"/></svg>
                    <svg class="block dark:hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>

                <a href="https://discord.gg/YOUR_INVITE" target="_blank" class="text-zinc-900 bg-zinc-100 hover:bg-zinc-200 dark:text-zinc-100 dark:bg-zinc-900 dark:hover:bg-zinc-800 px-3.5 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 transition-all text-xs tracking-wide code-font">Join Discord</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }} <!-- THIS IS THE MAGIC VARIABLE -->
    </main>

    <footer class="border-t border-zinc-200 dark:border-zinc-900 bg-white dark:bg-zinc-950 py-8 text-center text-xs text-zinc-500 dark:text-zinc-600 code-font">
        <div class="max-w-5xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>&copy; 2026 StarryBit Dev.</div>
            <div class="flex gap-6">
                <a href="mailto:contact@starrybitdev.com" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">Email</a>
                <a href="https://youtube.com/YOUR_CHANNEL" target="_blank" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">YouTube</a>
                <a href="https://github.com/starrybit" class="hover:text-zinc-800 dark:hover:text-zinc-400 transition-colors">GitHub</a>
            </div>
        </div>
    </footer>
</body>
</html>
