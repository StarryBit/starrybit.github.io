---
layout: default
---

<article class="prose dark:prose-invert max-w-none">

    <header class="mb-12">
        <h1 class="text-4xl font-bold tracking-tight">
            {{ page.title }}
        </h1>

        <p class="mt-3 text-sm text-zinc-500 code-font">
            {{ page.date | date: "%B %d, %Y" }}
        </p>
    </header>


    <div class="leading-8">
        {{ content }}
    </div>

</article>
