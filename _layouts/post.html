---
layout: default
---

<article>


<header class="mb-12 border-b border-zinc-200 dark:border-zinc-800/60 pb-8">

    <div class="flex items-center gap-2 mb-4">

        <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded bg-indigo-50 text-indigo-600 border border-indigo-100 dark:bg-indigo-500/10 dark:text-indigo-400 dark:border-indigo-500/20 code-font">
            Devlog
        </span>

        <span class="text-xs text-zinc-500 code-font">
            {{ page.date | date: "%B %d, %Y" }}
        </span>

    </div>


    <h1 class="text-3xl font-bold tracking-tight mb-3">

        {{ page.title }}

    </h1>


</header>



<section class="text-zinc-700 dark:text-zinc-300 leading-relaxed space-y-6">


{{ content }}


</section>


</article>
