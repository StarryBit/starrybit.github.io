---
layout: default
---

<article>

<header class="mb-12 border-b border-zinc-200 dark:border-zinc-800/60 pb-8">

    <div class="flex items-center gap-3 mb-4">

        <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded bg-indigo-50 text-indigo-600 border border-indigo-100 dark:bg-indigo-500/10 dark:text-indigo-400 dark:border-indigo-500/20 code-font">
            Devlog
        </span>

        <span class="text-xs text-zinc-500 code-font">
            {{ page.date | date: "%B %d, %Y" }}
        </span>

    </div>


    <h1 class="text-3xl font-bold tracking-tight">
        {{ page.title }}
    </h1>

</header>


<section>
    {{ content }}
</section>


<!-- Devlog Navigation -->
<nav class="mt-16 pt-8 border-t border-zinc-200 dark:border-zinc-800/60 flex justify-between gap-6">

    {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}"
       class="group max-w-[45%]">

        <p class="text-xs text-zinc-500 code-font mb-1">
            ← Previous Devlog
        </p>

        <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
            {{ page.previous.title }}
        </p>

    </a>
    {% else %}
    <div></div>
    {% endif %}



    {% if page.next %}
    <a href="{{ page.next.url | relative_url }}"
       class="group max-w-[45%] text-right">

        <p class="text-xs text-zinc-500 code-font mb-1">
            Next Devlog →
        </p>

        <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
            {{ page.next.title }}
        </p>

    </a>
    {% endif %}

</nav>
<style>

.image-gallery {
    position: relative;
    max-width: 850px;
    margin: 2.5rem auto;
    overflow: hidden;
    border-radius: 18px;
    border: 1px solid rgb(228 228 231);
    background: rgb(24 24 27);
}

.image-gallery img {
    display: none;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    background: rgb(24 24 27);
}

.image-gallery img.active {
    display: block;
}


/* Navigation buttons */

.image-gallery::before,
.image-gallery::after {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    border-radius: 999px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(0,0,0,.55);
    color: white;

    font-size: 22px;
    cursor: pointer;
    z-index: 5;

    transition: .2s;
}


.image-gallery::before {
    content: "‹";
    left: 14px;
}


.image-gallery::after {
    content: "›";
    right: 14px;
}


.image-gallery:hover::before,
.image-gallery:hover::after {
    background: rgba(0,0,0,.8);
}


/* Hide arrows when only one image */

.image-gallery.single::before,
.image-gallery.single::after {
    display:none;
}
</style>
    <script>

document.querySelectorAll(".image-gallery").forEach(gallery => {

    const images = gallery.querySelectorAll("img");

    if (images.length === 0) return;


    let index = 0;


    function showImage(i) {

        images.forEach(img => {
            img.classList.remove("active");
        });

        images[i].classList.add("active");

    }


    showImage(0);


    if (images.length === 1) {

        gallery.classList.add("single");
        return;

    }


    gallery.addEventListener("click", event => {


        const rect = gallery.getBoundingClientRect();

        const clickX = event.clientX - rect.left;


        if (clickX < rect.width / 2) {

            index--;

            if (index < 0)
                index = images.length - 1;

        } 
        
        else {

            index++;

            if (index >= images.length)
                index = 0;

        }


        showImage(index);

    });



    // swipe support for mobile

    let startX = 0;


    gallery.addEventListener("touchstart", e => {

        startX = e.touches[0].clientX;

    });


    gallery.addEventListener("touchend", e => {

        let endX = e.changedTouches[0].clientX;

        if (startX - endX > 50) {

            index++;

            if(index >= images.length)
                index = 0;

            showImage(index);

        }


        if (endX - startX > 50) {

            index--;

            if(index < 0)
                index = images.length - 1;

            showImage(index);

        }

    });


});

</script>
</article>
